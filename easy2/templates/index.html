<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sentiment Analyzer</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;color:#222;min-height:100vh}
  header{background:linear-gradient(135deg,#2c3e50,#3498db);color:white;padding:22px 40px}
  header h1{font-size:24px;font-weight:700}header p{font-size:13px;opacity:.8;margin-top:4px}
  .container{max-width:960px;margin:32px auto;padding:0 20px}
  .card{background:white;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:20px}
  h2{font-size:14px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
  textarea{width:100%;height:160px;border:1px solid #ddd;border-radius:8px;padding:14px;
    font-size:14px;resize:vertical;font-family:inherit;line-height:1.6}
  textarea:focus{outline:none;border-color:#3498db}
  .btn{padding:12px 28px;border:none;border-radius:8px;font-size:15px;font-weight:700;
    cursor:pointer;transition:opacity .2s}
  .btn-primary{background:linear-gradient(135deg,#3498db,#2980b9);color:white;width:100%;margin-top:10px}
  .btn-primary:hover{opacity:.88}
  .result-header{display:flex;align-items:center;gap:20px;margin-bottom:20px}
  .emoji-big{font-size:52px}
  .label-big{font-size:28px;font-weight:800}
  .compound{font-size:13px;color:#888;margin-top:4px}
  .bar-wrap{margin:10px 0}
  .bar-label{font-size:12px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
  .bar-bg{background:#eee;border-radius:6px;height:14px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px;transition:width .6s ease}
  .words-row{display:flex;gap:16px;margin-top:16px}
  .word-group{flex:1}
  .word-group h3{font-size:12px;color:#888;margin-bottom:8px;text-transform:uppercase}
  .word-tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:500}
  .tag-pos{background:#e8f5e9;color:#2e7d32}
  .tag-neg{background:#fce4ec;color:#c62828}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
  .stat{background:#f8f9fa;border-radius:8px;padding:12px;text-align:center}
  .stat-num{font-size:22px;font-weight:800;color:#3498db}
  .stat-lbl{font-size:11px;color:#888;margin-top:2px}
  .multi-result{border-left:4px solid;border-radius:6px;padding:12px 16px;margin-bottom:10px;background:#fafafa}
  #results{display:none}
  .sample-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .sbtn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #ddd;
    background:white;cursor:pointer;color:#555}
  .sbtn:hover{border-color:#3498db;color:#3498db}
  .mode-toggle{display:flex;gap:12px;margin-bottom:14px}
  .mode-btn{padding:7px 18px;border-radius:20px;border:1px solid #ddd;background:white;
    font-size:13px;cursor:pointer;color:#888}
  .mode-btn.active{background:#3498db;color:white;border-color:#3498db}
</style>
</head>
<body>
<header>
  <h1>💬 Sentiment Analyzer</h1>
  <p>Lexicon-based NLP sentiment analysis — Positive · Negative · Neutral</p>
</header>
<div class="container">
  <div class="card">
    <h2>Input Text</h2>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnSingle" onclick="setMode('single')">Single Text</button>
      <button class="mode-btn" id="btnMulti" onclick="setMode('multi')">Multi-line Batch</button>
    </div>
    <textarea id="inputText" placeholder="Enter text to analyze sentiment...

Example: This product is absolutely amazing! Best purchase I've made. Very fast delivery and excellent quality."></textarea>
    <div class="sample-row">
      <span style="font-size:11px;color:#aaa;align-self:center">Try:</span>
      <button class="sbtn" onclick="loadSample(1)">Positive review</button>
      <button class="sbtn" onclick="loadSample(2)">Negative review</button>
      <button class="sbtn" onclick="loadSample(3)">Mixed review</button>
      <button class="sbtn" onclick="loadSample(4)">Dark pattern text</button>
    </div>
    <button class="btn btn-primary" onclick="analyze()">🔍 Analyze Sentiment</button>
  </div>

  <div class="card" id="results">
    <h2>📊 Results</h2>
    <div id="resultsContent"></div>
  </div>
</div>

<script>
let mode = 'single';
const samples = {
  1: "This product is absolutely amazing! Best purchase I've made this year. Very fast delivery and excellent quality. Highly recommend to everyone.",
  2: "Terrible experience. The product was broken on arrival and customer support was completely useless. Very expensive for such poor quality. Never buying again.",
  3: "The product is good but the delivery was slow. Quality is nice but pricing is a bit expensive. Overall satisfied but not impressed.",
  4: "Hurry! Only 1 left. Don't miss this amazing deal. No thanks, I don't want to save money. Free trial auto renews. Hidden fees apply at checkout."
};
function setMode(m){
  mode=m;
  document.getElementById('btnSingle').className='mode-btn'+(m==='single'?' active':'');
  document.getElementById('btnMulti').className='mode-btn'+(m==='multi'?' active':'');
  document.getElementById('inputText').placeholder = m==='single'
    ? 'Enter text to analyze...'
    : 'Enter multiple texts, one per line. Each line analyzed separately.';
}
function loadSample(n){ document.getElementById('inputText').value=samples[n]; }

async function analyze(){
  const raw = document.getElementById('inputText').value.trim();
  if(!raw){alert('Please enter some text.');return;}
  const texts = mode==='multi' ? raw.split('\n').filter(l=>l.trim()) : [raw];
  const res = await fetch('/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({texts})});
  const data = await res.json();
  renderResults(data.results, texts);
}

function renderResults(results, texts){
  const box = document.getElementById('resultsContent');
  document.getElementById('results').style.display='block';
  if(results.length===1){
    const r = results[0];
    box.innerHTML = `
      <div class="result-header">
        <div class="emoji-big">${r.emoji}</div>
        <div>
          <div class="label-big" style="color:${r.color}">${r.label}</div>
          <div class="compound">Compound Score: ${r.compound} &nbsp;|&nbsp; ${r.pos_pct}% Positive &nbsp;|&nbsp; ${r.neg_pct}% Negative</div>
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>😊 Positive</span><span>${r.pos_pct}%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${r.pos_pct}%;background:#27ae60"></div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label"><span>😞 Negative</span><span>${r.neg_pct}%</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${r.neg_pct}%;background:#e74c3c"></div></div>
      </div>
      <div class="words-row">
        <div class="word-group">
          <h3>✅ Positive Words</h3>
          <div class="word-tags">${r.pos_words.length?r.pos_words.map(w=>`<span class="tag tag-pos">${w}</span>`).join(''):'<span style="color:#aaa;font-size:12px">None found</span>'}</div>
        </div>
        <div class="word-group">
          <h3>❌ Negative Words</h3>
          <div class="word-tags">${r.neg_words.length?r.neg_words.map(w=>`<span class="tag tag-neg">${w}</span>`).join(''):'<span style="color:#aaa;font-size:12px">None found</span>'}</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="stat-num">${r.word_count}</div><div class="stat-lbl">Word Count</div></div>
        <div class="stat"><div class="stat-num">${r.sentences}</div><div class="stat-lbl">Sentences</div></div>
        <div class="stat"><div class="stat-num">${r.avg_word_len}</div><div class="stat-lbl">Avg Word Length</div></div>
      </div>`;
  } else {
    box.innerHTML = results.map((r,i)=>`
      <div class="multi-result" style="border-color:${r.color}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;color:#555">${texts[i].substring(0,80)}${texts[i].length>80?'...':''}</div>
          <div style="font-size:18px;font-weight:800;color:${r.color};flex-shrink:0;margin-left:12px">${r.emoji} ${r.label}</div>
        </div>
        <div style="font-size:12px;color:#aaa;margin-top:4px">Score: ${r.compound} | +${r.pos_pct}% / -${r.neg_pct}%</div>
      </div>`).join('');
  }
}
</script>
</body>
</html>
