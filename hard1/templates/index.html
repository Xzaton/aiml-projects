<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DarkBot — AI Chatbot</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column}
  header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#e74c3c,#8e44ad);display:flex;align-items:center;justify-content:center;font-size:18px}
  .header-info h1{font-size:16px;font-weight:700}
  .header-info p{font-size:11px;color:#8b949e;margin-top:1px}
  .online{width:8px;height:8px;border-radius:50%;background:#2ea043;display:inline-block;margin-right:4px}
  .chat-area{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px}
  .msg-row{display:flex;gap:10px;align-items:flex-end;max-width:720px}
  .msg-row.user{flex-direction:row-reverse;align-self:flex-end}
  .msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
  .bot-av{background:linear-gradient(135deg,#e74c3c,#8e44ad)}
  .user-av{background:linear-gradient(135deg,#3498db,#2980b9)}
  .bubble{padding:11px 16px;border-radius:16px;font-size:14px;line-height:1.65;max-width:560px;white-space:pre-wrap;word-break:break-word}
  .bot-bubble{background:#21262d;border:1px solid #30363d;border-bottom-left-radius:4px}
  .user-bubble{background:linear-gradient(135deg,#1f6feb,#1a5fcc);border-bottom-right-radius:4px}
  .meta{font-size:10px;color:#8b949e;margin-top:4px;display:flex;gap:8px;align-items:center}
  .intent-chip{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:1px 7px;font-size:10px;color:#8b949e}
  .conf-bar{height:3px;border-radius:2px;margin-top:3px}
  .typing{display:none;align-items:center;gap:6px;padding:8px 14px;background:#21262d;border:1px solid #30363d;border-radius:16px;width:fit-content}
  .dot{width:7px;height:7px;border-radius:50%;background:#8b949e;animation:bounce 1.2s infinite}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
  .input-area{background:#161b22;border-top:1px solid #30363d;padding:14px 24px;flex-shrink:0}
  .input-row{display:flex;gap:10px;align-items:center}
  #msgInput{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;
    font-size:14px;padding:10px 16px;font-family:inherit;resize:none;height:44px;overflow:hidden}
  #msgInput:focus{outline:none;border-color:#388bfd}
  .send-btn{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#e74c3c,#c0392b);
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .send-btn:hover{opacity:.88}
  .reset-btn{padding:8px 14px;background:#21262d;border:1px solid #30363d;border-radius:8px;
    color:#8b949e;font-size:12px;cursor:pointer}
  .reset-btn:hover{border-color:#e74c3c;color:#e74c3c}
  .quick-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .qbtn{font-size:11px;padding:5px 10px;border-radius:8px;border:1px solid #30363d;
    background:#21262d;color:#8b949e;cursor:pointer;transition:all .15s}
  .qbtn:hover{border-color:#388bfd;color:#58a6ff}
</style>
</head>
<body>
<header>
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>DarkBot <span style="font-weight:400;color:#8b949e">— Dark Patterns AI Assistant</span></h1>
    <p><span class="online"></span>Online &nbsp;·&nbsp; Intent Classification Chatbot &nbsp;·&nbsp; SVM + TF-IDF</p>
  </div>
  <button class="reset-btn" onclick="resetChat()" style="margin-left:auto">🔄 Reset</button>
</header>

<div class="chat-area" id="chatArea">
  <!-- Welcome message injected by JS -->
</div>

<div class="input-area">
  <div class="quick-btns" id="quickBtns">
    <span style="font-size:11px;color:#555;align-self:center">Quick:</span>
    <button class="qbtn" onclick="send('What is a dark pattern?')">What is a dark pattern?</button>
    <button class="qbtn" onclick="send('Give me examples')">Give me examples</button>
    <button class="qbtn" onclick="send('Is it illegal?')">Is it illegal?</button>
    <button class="qbtn" onclick="send('How to detect them?')">How to detect?</button>
    <button class="qbtn" onclick="send('What is confirm shaming?')">Confirm shaming</button>
    <button class="qbtn" onclick="send('How to design ethically?')">Ethical design</button>
  </div>
  <div class="input-row">
    <textarea id="msgInput" placeholder="Ask about dark patterns, GDPR, UX ethics..." onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendFromInput()">➤</button>
  </div>
</div>

<script>
function addMessage(text, isUser, meta=null){
  const area = document.getElementById('chatArea');
  const row = document.createElement('div');
  row.className = `msg-row ${isUser?'user':''}`;
  const confColor = meta ? (meta.conf>80?'#2ea043':meta.conf>50?'#f39c12':'#e74c3c') : '#8b949e';
  row.innerHTML = `
    <div class="msg-avatar ${isUser?'user-av':'bot-av'}">${isUser?'👤':'🤖'}</div>
    <div>
      <div class="bubble ${isUser?'user-bubble':'bot-bubble'}">${text.replace(/\n/g,'<br>')}</div>
      ${meta&&!isUser?`<div class="meta">
        <span class="intent-chip">${meta.intent}</span>
        <span>${meta.conf}% confidence</span>
        <div class="conf-bar" style="width:${meta.conf}px;background:${confColor}"></div>
      </div>`:''}
    </div>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function showTyping(){
  const area = document.getElementById('chatArea');
  const t = document.createElement('div');
  t.id='typingIndicator'; t.className='msg-row';
  t.innerHTML=`<div class="msg-avatar bot-av">🤖</div><div class="typing" style="display:flex"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  area.appendChild(t); area.scrollTop=area.scrollHeight;
}
function hideTyping(){ const t=document.getElementById('typingIndicator'); if(t)t.remove(); }

async function send(text){
  if(!text.trim())return;
  addMessage(text, true);
  document.getElementById('msgInput').value='';
  showTyping();
  const res = await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
  const d = await res.json();
  hideTyping();
  addMessage(d.response, false, {intent:d.intent, conf:d.confidence});
}

function sendFromInput(){
  const val = document.getElementById('msgInput').value.trim();
  if(val) send(val);
}
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendFromInput();} }

async function resetChat(){
  await fetch('/reset',{method:'POST'});
  document.getElementById('chatArea').innerHTML='';
  init();
}

function init(){
  setTimeout(()=>{
    addMessage("👋 Hello! I'm **DarkBot**, an AI assistant specialized in dark patterns, UX ethics, and consumer protection.\n\nI can explain:\n• What dark patterns are\n• Types: Roach Motel, Confirm Shaming, Hidden Costs...\n• Legal frameworks: GDPR, FTC, DSA\n• How to detect & prevent them\n\nAsk me anything! 🕵️", false, {intent:'greeting', conf:99});
  }, 300);
}
init();
</script>
</body>
</html>
